<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Rent A Car</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Iniciar Sesión</h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Correo electrónico"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="login.js"></script>

</body>
</html>
