<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>

    <h1>Bienvenido a Rent A Car</h1>

    <button id="logout">
        Cerrar sesión
    </button>

    <script>

        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        document
            .getElementById('logout')
            .addEventListener('click', () => {

                localStorage.removeItem('token');

                window.location.href = 'login.html';

            });

    </script>

</body>
</html>
